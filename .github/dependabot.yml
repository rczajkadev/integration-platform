version: 2

registries:
  github-packages:
    type: nuget-feed
    url: https://nuget.pkg.github.com/rafalczajka/index.json
    username: rafalczajka
    password: ${{secrets.DEPENDABOT_GITHUB_PACKAGES_TOKEN}}

updates:
  - package-ecosystem: nuget
    directory: /
    registries:
      - github-packages
    schedule:
      interval: weekly
    ignore:
      - dependency-name: Microsoft.ApplicationInsights.WorkerService
      - dependency-name: Microsoft.CodeAnalysis.CSharp
    groups:
      nuget:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
